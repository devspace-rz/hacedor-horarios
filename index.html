<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armador de Horarios - UPIIG</title>
  <!-- Tailwind CSS para diseño moderno -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .celda-hora { min-height: 80px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

  <!-- BARRA SUPERIOR DE NAVEGACIÓN -->
  <header class="bg-slate-900 border-b border-slate-800 p-4 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <h1 class="text-xl font-bold text-cyan-400">Horarios UPIIG</h1>
      <div class="flex items-center gap-2">
        <label class="text-xs font-medium text-slate-400">Carrera actual:</label>
        <select id="selector-carrera" class="p-2 bg-slate-800 rounded border border-slate-700 text-sm text-white focus:outline-none focus:border-cyan-500">
          <!-- Se llena con JS -->
        </select>
      </div>
    </div>
    <button id="btn-reiniciar" class="bg-red-900/40 border border-red-700 hover:bg-red-800 text-white px-4 py-2 rounded text-xs font-semibold transition-colors cursor-pointer">
      Limpiar Todo el Horario
    </button>
  </header>

  <!-- ESPACIO DE TRABAJO -->
  <div class="flex flex-1 overflow-hidden">
    
    <!-- Panel Lateral: Banco de Materias -->
    <div class="w-80 bg-slate-900 border-r border-slate-800 p-4 flex flex-col">
      <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Materias Disponibles</h2>
      <div id="banco-materias" class="flex-1 overflow-y-auto space-y-2 pr-1">
        <!-- Las materias se cargan dinámicamente aquí -->
      </div>
      <p class="text-[11px] text-slate-500 mt-3 text-center italic">Tip: Puedes arrastrar la misma materia varias veces para cubrir todos sus días y horas a la semana.</p>
    </div>

    <!-- Panel Central: Cuadrícula del Horario -->
    <div class="flex-1 p-6 overflow-auto">
      <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl min-w-[800px]">
        <!-- Encabezado de Días -->
        <div class="grid grid-cols-6 bg-slate-800 text-center font-semibold text-xs text-slate-300 py-3 border-b border-slate-700">
          <div>Hora</div>
          <div>Lunes</div>
          <div>Martes</div>
          <div>Miércoles</div>
          <div>Jueves</div>
          <div>Viernes</div>
        </div>
        <!-- Filas de Horas -->
        <div id="filas-horario" class="divide-y divide-slate-800">
          <!-- Generado con JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Importamos nuestros datos y la lógica -->
  <script src="materias.js"></script>
  <script>
    const horas = [
      "07:00 - 08:30", 
      "08:30 - 10:00", 
      "10:00 - 11:30", 
      "11:30 - 13:00", 
      "13:00 - 14:30", 
      "14:30 - 16:00",
      "16:00 - 17:30",
      "17:30 - 19:00",
      "19:00 - 20:30"
    ];
    const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
    
    // Almacena qué materia está en cada celda concreta del horario
    let materiasAsignadas = {}; 

    // Inicializar la App
    const selector = document.getElementById('selector-carrera');
    
    // Llenar selector de carreras
    Object.keys(ofertaAcademica).forEach(carrera => {
      const opt = document.createElement('option');
      opt.value = carrera;
      opt.textContent = carrera;
      selector.appendChild(opt);
    });

    // Escuchar cambios de carrera en el menú
    selector.addEventListener('change', (e) => {
      cargarBancoMaterias(e.target.value);
    });

    // Botón para resetear todo el canvas
    document.getElementById('btn-reiniciar').addEventListener('click', () => {
      if(confirm("¿Seguro que quieres borrar todo tu horario actual?")) {
        materiasAsignadas = {};
        generarCuadricula();
      }
    });

    // Renderizar las materias en el banco izquierdo (AHORA SE QUEDAN FIJAS)
    function cargarBancoMaterias(carrera) {
      const banco = document.getElementById('banco-materias');
      banco.innerHTML = ""; 

      if (!carrera) return;

      ofertaAcademica[carrera].forEach((materia, index) => {
        const div = document.createElement('div');
        div.className = "p-3 bg-slate-800 rounded-lg border border-slate-700 shadow cursor-grab hover:border-cyan-500/50 transition-colors select-none";
        div.draggable = true;
        
        // Usamos un ID único combinando el id de la materia y su índice para el drag & drop
        div.id = `drag-${materia.id}-${index}`;
        
        // Guardamos los datos puros de la materia dentro de los metadatos del HTML
        div.dataset.materiaInfo = JSON.stringify(materia);

        div.innerHTML = `
          <p class="text-sm font-medium text-slate-200">${materia.nombre}</p>
          <span class="text-[10px] text-slate-400 bg-slate-700 px-1.5 py-0.5 rounded mt-1 inline-block">${materia.semestre}</span>
        `;
        
        div.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', e.target.id);
        });

        banco.appendChild(div);
      });
    }

    // Generar o redibujar la cuadrícula manteniendo el estado actual
    function generarCuadricula() {
      const contenedorFilas = document.getElementById('filas-horario');
      contenedorFilas.innerHTML = ""; 

      horas.forEach(hora => {
        const fila = document.createElement('div');
        fila.className = "grid grid-cols-6 celda-hora";
        
        fila.innerHTML = `<div class="flex items-center justify-center bg-slate-900/50 text-xs font-medium text-slate-400 p-2 border-r border-slate-800 text-center">${hora}</div>`;
        
        dias.forEach(dia => {
          const idCelda = `${dia}-${hora}`;
          const celda = document.createElement('div');
          celda.className = "p-2 border-r border-slate-800 last:border-r-0 bg-slate-900/20 flex flex-col justify-center transition-colors relative group";
          celda.id = idCelda;

          // Si esta celda tiene una materia guardada, la dibujamos
          if (materiasAsignadas[idCelda]) {
            const mat = materiasAsignadas[idCelda];
            celda.innerHTML = `
              <div class="bg-cyan-600/20 border border-cyan-500 text-cyan-300 p-2 rounded text-center text-xs font-semibold shadow-sm w-full cursor-pointer relative group hover:bg-red-950/40 hover:border-red-500 hover:text-red-400 transition-all" 
                   title="Haz clic para quitar de este bloque" onclick="quitarMateria('${idCelda}')">
                <span class="block group-hover:hidden">${mat.nombre}</span>
                <span class="hidden group-hover:block font-bold">❌ Quitar</span>
              </div>
            `;
          }

          // Eventos Drop para capturar el arrastre
          celda.addEventListener('dragover', (e) => e.preventDefault());
          celda.addEventListener('drop', (e) => {
            e.preventDefault();
            const idElementoArrastrado = e.dataTransfer.getData('text/plain');
            const elementoOriginal = document.getElementById(idElementoArrastrado);
            
            if (!elementoOriginal) return;
            
            // Validar que la celda de la hora/día esté vacía antes de meter la materia
            if (!materiasAsignadas[idCelda]) {
              const infoMateria = JSON.parse(elementoOriginal.dataset.materiaInfo);
              
              // Guardamos la materia en esta celda específica
              materiasAsignadas[idCelda] = infoMateria;
              
              // Redibujamos solo la cuadrícula
              generarCuadricula();
            }
          });
          
          fila.appendChild(celda);
        });
        contenedorFilas.appendChild(fila);
      });
    }

    // Función para quitar una sola materia de una celda específica
    function quitarMateria(idCelda) {
      delete materiasAsignadas[idCelda];
      generarCuadricula();
    }

    // Arranque inicial automático
    cargarBancoMaterias(selector.value);
    generarCuadricula();
  </script>
</body>
</html>

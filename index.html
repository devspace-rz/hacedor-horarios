<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armador de Horarios - UPIIG</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .celda-hora { min-height: 85px; }
    /* Personalización sutil para la barra de desplazamiento en celular */
    .custom-scrollbar::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #334155;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans md:h-screen flex flex-col md:overflow-hidden min-h-screen">

  <header class="bg-slate-900 border-b border-slate-800 p-4 flex flex-wrap items-center justify-between gap-4 md:h-16 shrink-0">
    <div class="flex items-center gap-4 flex-wrap">
      <h1 class="text-xl font-bold text-cyan-400">Horarios UPIIG</h1>
      <div class="flex items-center gap-2">
        <label class="text-xs font-medium text-slate-400">Carrera actual:</label>
        <select id="selector-carrera" class="p-2 bg-slate-800 rounded border border-slate-700 text-sm text-white focus:outline-none focus:border-cyan-500">
        </select>
      </div>
    </div>
    <button id="btn-reiniciar" class="bg-red-900/40 border border-red-700 hover:bg-red-800 text-white px-4 py-2 rounded text-xs font-semibold transition-colors cursor-pointer-none">
      Limpiar Todo el Horario
    </button>
  </header>

  <div class="flex flex-col md:flex-row flex-1 md:overflow-hidden">
    
    <div class="w-full md:w-80 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 p-4 flex flex-col h-[300px] md:h-full shrink-0">
      <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Materias Disponibles</h2>
      
      <div class="mb-3">
        <label class="text-[11px] font-medium text-slate-400 block mb-1">Filtrar por bloque:</label>
        <select id="filtro-semestre" class="w-full p-2 bg-slate-800 rounded border border-slate-700 text-xs text-white focus:outline-none focus:border-cyan-500">
          <option value="todos">Mostrar todos los semestres</option>
        </select>
      </div>

      <div id="banco-materias" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
      </div>
      <p class="hidden md:block text-[10px] text-slate-500 mt-2 text-center italic shrink-0">Tip: Filtra por semestre para no perderte entre tanta materia.</p>
    </div>

    <div class="flex-1 p-4 md:p-6 overflow-x-auto md:overflow-y-auto h-full bg-slate-950 custom-scrollbar">
      <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl min-w-[800px] md:min-w-0">
        
        <div class="grid grid-cols-6 bg-slate-800 text-center font-semibold text-xs text-slate-300 py-3 border-b border-slate-700 sticky top-0 z-10">
          <div>Hora</div>
          <div>Lunes</div>
          <div>Martes</div>
          <div>Miércoles</div>
          <div>Jueves</div>
          <div>Viernes</div>
        </div>
        
        <div id="filas-horario" class="divide-y divide-slate-800">
        </div>

      </div>
    </div>
  </div>

  <script src="materias.js"></script>
  <script>
    const horas = [
      "07:00 - 08:30", 
      "08:30 - 10:00", 
      "10:00 - 11:30", 
      "11:30 - 13:00", 
      "13:00 - 14:30", 
      "14:30 - 16:00",
      "16:00 - 17:30",
      "17:30 - 19:00",
      "19:00 - 20:30"
    ];
    const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
    
    // --- CONEXIÓN DIRECTA AL LOCALSTORAGE ---
    let materiasAsignadas = {}; 
    const horarioGuardado = localStorage.getItem('horario_upiig');
    if (horarioGuardado) {
      materiasAsignadas = JSON.parse(horarioGuardado);
    }
    
    const selector = document.getElementById('selector-carrera');
    const filtroSemestre = document.getElementById('filtro-semestre');
    
    // Inicializar carreras
    Object.keys(ofertaAcademica).forEach(carrera => {
      const opt = document.createElement('option');
      opt.value = carrera;
      opt.textContent = carrera;
      selector.appendChild(opt);
    });

    // Cambios de Carrera
    selector.addEventListener('change', (e) => {
      actualizarOpcionesFiltro(e.target.value);
      cargarBancoMaterias(e.target.value, "todos");
    });

    // Cambios de Filtro de Semestre
    filtroSemestre.addEventListener('change', (e) => {
      cargarBancoMaterias(selector.value, e.target.value);
    });

    // Limpiar Horario Completo
    document.getElementById('btn-reiniciar').addEventListener('click', () => {
      if(confirm("¿Seguro que quieres borrar todo tu horario actual?")) {
        materiasAsignadas = {};
        localStorage.removeItem('horario_upiig'); // Limpia almacenamiento local
        generarCuadricula();
      }
    });

    // Actualizar filtros
    function actualizarOpcionesFiltro(carrera) {
      filtroSemestre.innerHTML = '<option value="todos">Mostrar todos los semestres</option>';
      if (!carrera || !ofertaAcademica[carrera]) return;

      const semestresUnicos = [...new Set(ofertaAcademica[carrera].map(m => m.semestre))];
      semestresUnicos.forEach(sem => {
        const opt = document.createElement('option');
        opt.value = sem;
        opt.textContent = sem;
        filtroSemestre.appendChild(opt);
      });
    }

    // Cargar materias en el banco lateral
    function cargarBancoMaterias(carrera, semestreFiltro) {
      const banco = document.getElementById('banco-materias');
      banco.innerHTML = ""; 

      if (!carrera || !ofertaAcademica[carrera]) return;

      ofertaAcademica[carrera].forEach((materia, index) => {
        if (semestreFiltro !== "todos" && materia.semestre !== semestreFiltro) return;

        const div = document.createElement('div');
        div.className = "p-3 bg-slate-800 rounded-lg border border-slate-700 shadow cursor-grab hover:border-cyan-500/50 transition-colors select-none shrink-0";
        div.draggable = true;
        div.id = `drag-${materia.id}-${index}`;
        div.dataset.materiaInfo = JSON.stringify(materia);

        div.innerHTML = `
          <p class="text-xs font-medium text-slate-200 leading-tight">${materia.nombre}</p>
          <span class="text-[9px] text-slate-400 bg-slate-700 px-1.5 py-0.5 rounded mt-1 inline-block">${materia.semestre}</span>
        `;
        
        div.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', e.target.id);
        });

        banco.appendChild(div);
      });
    }

    // Generar la grilla del horario
    function generarCuadricula() {
      const contenedorFilas = document.getElementById('filas-horario');
      contenedorFilas.innerHTML = ""; 

      horas.forEach(hora => {
        const fila = document.createElement('div');
        fila.className = "grid grid-cols-6 celda-hora";
        fila.innerHTML = `<div class="flex items-center justify-center bg-slate-900/50 text-xs font-medium text-slate-400 p-2 border-r border-slate-800 text-center">${hora}</div>`;
        
        dias.forEach(dia => {
          const idCelda = `${dia}-${hora}`;
          const celda = document.createElement('div');
          celda.className = "p-2 border-r border-slate-800 last:border-r-0 bg-slate-900/20 flex flex-col justify-center transition-colors relative group";
          celda.id = idCelda;

          if (materiasAsignadas[idCelda]) {
            const mat = materiasAsignadas[idCelda];
            celda.innerHTML = `
              <div class="bg-cyan-600/20 border border-cyan-500 text-cyan-300 p-2 rounded flex flex-col items-center justify-center h-full text-center text-xs font-semibold shadow-sm w-full cursor-pointer relative group hover:bg-red-950/40 hover:border-red-500 hover:text-red-400 transition-all" 
                   title="Haz clic para quitar de este bloque" onclick="quitarMateria('${idCelda}')">
                <span class="block group-hover:hidden text-[10px] md:text-[11px] leading-tight overflow-hidden text-ellipsis">${mat.nombre}</span>
                <span class="hidden group-hover:block font-bold text-xs">❌ Quitar</span>
              </div>
            `;
          }

          celda.addEventListener('dragover', (e) => e.preventDefault());
          celda.addEventListener('drop', (e) => {
            e.preventDefault();
            const idElementoArrastrado = e.dataTransfer.getData('text/plain');
            const elementoOriginal = document.getElementById(idElementoArrastrado);
            
            if (!elementoOriginal) return;
            
            if (!materiasAsignadas[idCelda]) {
              const infoMateria = JSON.parse(elementoOriginal.dataset.materiaInfo);
              materiasAsignadas[idCelda] = infoMateria;
              
              // Guardar estado actual tras arrastrar exitosamente
              localStorage.setItem('horario_upiig', JSON.stringify(materiasAsignadas));
              generarCuadricula();
            }
          });
          
          fila.appendChild(celda);
        });
        contenedorFilas.appendChild(fila);
      });
    }

    // Quitar materia individual
    function quitarMateria(idCelda) {
      delete materiasAsignadas[idCelda];
      localStorage.setItem('horario_upiig', JSON.stringify(materiasAsignadas)); // Sincroniza LocalStorage
      generarCuadricula();
    }

    // Inicialización de la UI
    actualizarOpcionesFiltro(selector.value);
    cargarBancoMaterias(selector.value, "todos");
    generarCuadricula();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Horarios - UPIIG</title>
  <style>
    /* --- ESTILOS GENERALES Y LAYOUT --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #003366;
      margin-bottom: 25px;
    }

    .controles {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    select, button {
      padding: 10px 15px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      background-color: #d9534f;
      color: white;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #c9302c;
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
    }

    /* --- BANCO DE MATERIAS (IZQUIERDA) --- */
    .banco-materias {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      max-height: 75vh;
      overflow-y: auto;
    }

    .banco-materias h3 {
      margin-top: 0;
      border-bottom: 2px solid #003366;
      padding-bottom: 8px;
      color: #003366;
    }

    .materia-card {
      background: #eef2f7;
      padding: 10px;
      margin-bottom: 10px;
      border-left: 4px solid #003366;
      border-radius: 4px;
      cursor: grab;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.15s;
    }

    .materia-card:active {
      cursor: grabbing;
      transform: scale(0.98);
    }

    /* --- SUPER OPTIMIZACIÓN CELULAR (DERECHA) --- */
    .contenedor-horario-responsivo {
      width: 100%;
      overflow-x: auto; /* Activa el desplazamiento lateral con el dedo en celular */
      -webkit-overflow-scrolling: touch; /* Suaviza el scroll en iOS y Android */
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    #filas-horario {
      display: grid;
      grid-template-columns: 100px repeat(5, 1fr); /* Horas + 5 Días de la semana */
      min-width: 100%; /* Por defecto en PC abarca todo */
    }

    .celda {
      border: 1px solid #e2e8f0;
      padding: 10px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 13px;
    }

    .encabezado {
      background-color: #003366;
      color: white;
      font-weight: bold;
      min-height: 40px;
    }

    .hora-col {
      background-color: #f8fafc;
      font-weight: bold;
      color: #64748b;
    }

    /* --- DISEÑO DE MATERIA YA LNEADA EN EL HORARIO --- */
    .materia-asignada {
      background-color: #d1e7dd;
      color: #0f5132;
      border: 1px dashed #badbcc;
      border-radius: 4px;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px;
      position: relative;
    }

    .btn-borrar {
      background: none;
      border: none;
      color: #dc3545;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
      padding: 2px;
      margin-top: 4px;
      align-self: center;
    }

    /* --- RESPONSIVE MEDIA QUERIES (BREAKPOINT DE CELULAR) --- */
    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr; /* Apila el banco de materias arriba del horario */
      }
      
      .banco-materias {
        max-height: 250px;
      }

      #filas-horario {
        /* Forzamos que la cuadrícula mida mínimo 800px de ancho en pantallas chicas.
           Esto evita que las columnas colapsen y empalmen los nombres de las materias. */
        min-width: 800px; 
      }

      .celda-materia-nombre {
        white-space: nowrap;       /* Mantiene el texto en un solo renglón */
        overflow: hidden;          /* Recorta lo sobrante */
        text-overflow: ellipsis;   /* Agrega los tres puntitos (...) */
        width: 100%;
        max-width: 120px;          /* Espacio seguro por columna */
      }
    }
  </style>
</head>
<body>

  <h1>Simulador de Horarios UPIIG</h1>

  <div class="controles">
    <select id="selector-carrera">
      <option value="Ingeniería Industrial (Plan 2022)">Ingeniería Industrial (Plan 2022)</option>
      <option value="Ingeniería Industrial - Plan Anterior">Ingeniería Industrial - Plan Anterior</option>
      <option value="Ingeniería Biotecnológica (Plan 2023)">Ingeniería Biotecnológica (Plan 2023)</option>
      <option value="Ingeniería Farmacéutica">Ingeniería Farmacéutica</option>
      <option value="Ingeniería en Sistemas Automotrices">Ingeniería en Sistemas Automotrices</option>
    </select>
    <button id="btn-reiniciar">Limpiar Todo el Horario</button>
  </div>

  <div class="workspace">
    <div class="banco-materias">
      <h3>Materias Disponibles</h3>
      <div id="lista-materias"></div>
    </div>

    <div class="contenedor-horario-responsivo">
      <div id="filas-horario">
        </div>
    </div>
  </div>

  <script src="materias.js"></script>
  
  <script>
    // Configuración global de la cuadrícula
    const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
    const horas = ["07:00 - 08:30", "08:30 - 10:00", "10:00 - 11:30", "11:30 - 13:00", "13:00 - 14:30", "14:30 - 16:00", "16:00 - 17:30", "17:30 - 19:00"];

    // Carga de estado inicial buscando en el almacenamiento local (LocalStorage)
    let materiasAsignadas = {};
    const horarioGuardado = localStorage.getItem('horario_upiig');
    if (horarioGuardado) {
      materiasAsignadas = JSON.parse(horarioGuardado);
    }

    const selector = document.getElementById('selector-carrera');
    const listaMaterias = document.getElementById('lista-materias');

    // Inicializar la App
    selector.addEventListener('change', (e) => {
      cargarBanco(e.target.value);
    });

    function cargarBanco(carrera) {
      listaMaterias.innerHTML = "";
      const materias = ofertaAcademica[carrera] || [];
      
      materias.forEach(mat => {
        const div = document.createElement('div');
        div.className = "materia-card";
        div.innerText = `${mat.nombre} (${mat.semestre})`;
        div.draggable = true;
        div.id = mat.id;
        
        // Adjuntar metadatos para el arrastre
        div.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', mat.id);
          e.dataTransfer.setData('application/json', JSON.stringify(mat));
        });
        
        listaMaterias.appendChild(div);
      });
    }

    function generarCuadricula() {
      const container = document.getElementById('filas-horario');
      container.innerHTML = "";

      // 1. Generar Fila de Encabezados (Días)
      const esquina = document.createElement('div');
      esquina.className = "celda encabezado";
      esquina.innerText = "Hora";
      container.appendChild(esquina);

      dias.forEach(dia => {
        const div = document.createElement('div');
        div.className = "celda encabezado";
        div.innerText = dia;
        container.appendChild(div);
      });

      // 2. Generar Filas de Horas con Celdas de Destino
      horas.forEach(hora => {
        const celdaHora = document.createElement('div');
        celdaHora.className = "celda hora-col";
        celdaHora.innerText = hora;
        container.appendChild(celdaHora);

        dias.forEach(dia => {
          const celdaId = `${dia}_${hora.replace(/ /g, "")}`;
          const celdaDestino = document.createElement('div');
          celdaDestino.className = "celda";
          celdaDestino.dataset.celdaId = celdaId;

          // Manejadores de Eventos Drag & Drop
          celdaDestino.addEventListener('dragover', (e) => e.preventDefault());

          celdaDestino.addEventListener('drop', (e) => {
            e.preventDefault();
            const matJson = e.dataTransfer.getData('application/json');
            if (!matJson) return;
            
            const infoMateria = JSON.parse(matJson);
            
            // Asignar y Guardar en LocalStorage
            materiasAsignadas[celdaId] = infoMateria;
            localStorage.setItem('horario_upiig', JSON.stringify(materiasAsignadas));
            
            generarCuadricula();
          });

          // Si hay una materia guardada en esta posición, pintarla
          if (materiasAsignadas[celdaId]) {
            const mat = materiasAsignadas[celdaId];
            celdaDestino.innerHTML = `
              <div class="materia-asignada">
                <span class="celda-materia-nombre">${mat.nombre}</span>
                <button class="btn-borrar" onclick="quitarMateria('${celdaId}')">Quitar</button>
              </div>
            `;
          }

          container.appendChild(celdaDestino);
        });
      });
    }

    // Remover materia individual y actualizar almacenamiento
    window.quitarMateria = function(celdaId) {
      delete materiasAsignadas[celdaId];
      localStorage.setItem('horario_upiig', JSON.stringify(materiasAsignadas));
      generarCuadricula();
    }

    // Botón para resetear completo
    document.getElementById('btn-reiniciar').addEventListener('click', () => {
      if (confirm("¿Estás seguro de que quieres limpiar todo tu horario planeado?")) {
        materiasAsignadas = {};
        localStorage.removeItem('horario_upiig');
        generarCuadricula();
      }
    });

    // Carga inicial al cargar el DOM
    cargarBanco(selector.value);
    generarCuadricula();
  </script>
</body>
</html>
